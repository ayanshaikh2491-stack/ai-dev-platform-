<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dev Agent</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* sidebar */

#sidebar{
width:250px;
background:#020617;
padding:20px;
border-right:1px solid #333;
}

#sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
}

/* chat area */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin-bottom:20px;
}

.user{
color:#38bdf8;
}

.ai{
color:#22c55e;
white-space:pre-wrap;
}

/* input area */

#inputBox{
display:flex;
padding:15px;
border-top:1px solid #333;
}

#inputBox input{
flex:1;
padding:12px;
background:#1e293b;
border:none;
color:white;
}

#inputBox button{
padding:12px 20px;
background:#22c55e;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div id="sidebar">
<h3>AI Dev Agent</h3>
<button onclick="newChat()">New Chat</button>
<input id="repo" placeholder="username/repo" style="width:100%;padding:8px;">
</div>

<div id="main">

<div id="chat"></div>

<div id="inputBox">
<input id="msg" placeholder="Ask AI to edit repo..." />
<button onclick="send()">Send</button>
</div>

</div>

<script>

let session = crypto.randomUUID()

function newChat(){
session = crypto.randomUUID()
document.getElementById("chat").innerHTML=""
}

async function send(){

const repo=document.getElementById("repo").value
const msg=document.getElementById("msg").value
const chat=document.getElementById("chat")

chat.innerHTML += `<div class="msg user">You: ${msg}</div>`

const res = await fetch("/api/agent",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
repo,
instruction:msg,
session
})
})

const data = await res.json()

chat.innerHTML += `<div class="msg ai">AI: ${JSON.stringify(data,null,2)}</div>`

chat.scrollTop = chat.scrollHeight

document.getElementById("msg").value=""

}

</script>

</body>
</html>
